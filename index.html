<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>講師アシスタント | SSS Education</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --gold: #d3ad4f;
      --black: #0a0a0a;
      --card-bg: #1a1a1a;
      --white: #ffffff;
      --text-gray: #a0a0a0;
    }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--black); color: var(--white); margin: 0; padding: 15px; }
    .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(211, 173, 79, 0.3); padding-bottom: 15px; }
    .logo { font-size: 10px; letter-spacing: 3px; color: var(--gold); }
    h1 { font-size: 18px; margin: 5px 0 0 0; font-weight: normal; }
    
    .card { background-color: var(--card-bg); border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .card-title { font-size: 14px; color: var(--gold); margin-bottom: 10px; border-left: 3px solid var(--gold); padding-left: 8px; }
    
    textarea { width: 100%; height: 100px; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; box-sizing: border-box; resize: none; font-size: 13px; margin-bottom: 15px; }
    textarea:focus { outline: none; border-color: var(--gold); }
    
    .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; letter-spacing: 1px; transition: 0.2s; }
    .btn-in { background: var(--gold); color: var(--black); }
    .btn-in:hover { background: #b89542; }
    .btn-out { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
    .btn-out:hover { background: rgba(211, 173, 79, 0.1); }
    .btn:disabled { opacity: 0.5; cursor: wait; }

    #status-msg { margin-top: 15px; font-size: 13px; text-align: center; white-space: pre-wrap; line-height: 1.5; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">SSS Education</div>
    <h1>講師ポータル</h1>
  </div>

  <div class="card">
    <div class="card-title">▶ 出勤・本日の予定</div>
    <textarea id="planned-task" placeholder="例：&#10;・17:00〜18:30 〇〇君 数学指導&#10;・18:30〜 小テスト作成&#10;・20:00〜 面談同席"></textarea>
    <button class="btn btn-in" id="btn-in" onclick="submitAttendance('clockIn')">出勤して予定を報告</button>
  </div>

  <div class="card">
    <div class="card-title">■ 退勤・成果報告</div>
    <textarea id="result-task" placeholder="例：&#10;・〇〇君の数学指導完了。二次関数の理解度70%&#10;・小テスト3回分作成完了&#10;・次回、〇〇の教材準備が必要"></textarea>
    <button class="btn btn-out" id="btn-out" onclick="submitAttendance('clockOut')">成果を報告して退勤</button>
  </div>

  <div id="status-msg"></div>

  <script>
    // ★ ここにGASのWebアプリURL（最新）を貼り付けてください
    const API_ENDPOINT = 'https://script.google.com/macros/s/AKfycbyclB58dLRD1kawXot4nE9cW0Lq3tMnnFPZ_29NbOhp9StL693615lPrVW_palugJp9_A/exec';
    
    // URLの ?token=xxx を取得
    const token = new URLSearchParams(location.search).get('token');

    async function submitAttendance(action) {
      if (!token) {
        alert("URLが正しくありません。管理者から配布されたURLを使用してください。");
        return;
      }

      const plannedTask = document.getElementById('planned-task').value.trim();
      const resultTask = document.getElementById('result-task').value.trim();

      if (action === 'clockIn' && !plannedTask) {
        alert("本日の業務予定（何をやるか）を入力してください。");
        return;
      }
      if (action === 'clockOut' && !resultTask) {
        alert("本日の成果（何をやったか）を入力してください。");
        return;
      }

      const btnIn = document.getElementById('btn-in');
      const btnOut = document.getElementById('btn-out');
      const statusMsg = document.getElementById('status-msg');

      // ボタン無効化＆メッセージ
      btnIn.disabled = true;
      btnOut.disabled = true;
      statusMsg.style.color = "var(--white)";
      statusMsg.innerText = "通信中...";

      try {
        const res = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: action,
            token: token,
            plannedTask: plannedTask,
            resultTask: resultTask
          })
        });

        if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
        const json = await res.json();

        if (json.ok) {
          statusMsg.style.color = "var(--gold)";
          statusMsg.innerText = "✅ " + json.message;
          // 送信成功したら入力欄を空にする
          if (action === 'clockIn') document.getElementById('planned-task').value = "";
          if (action === 'clockOut') document.getElementById('result-task').value = "";
        } else {
          throw new Error(json.error);
        }
      } catch (err) {
        console.error(err);
        statusMsg.style.color = "#ff4d4d";
        statusMsg.innerText = "❌ エラー: " + err.message;
      } finally {
        btnIn.disabled = false;
        btnOut.disabled = false;
      }
    }
  </script>
</body>
</html>
